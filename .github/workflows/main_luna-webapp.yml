name: Build and deploy Python app to Azure Web App - luna-final-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Bundle frontend with backend
        run: |
          rm -rf InnerVoice_Jelly/dist
          cp -R dist InnerVoice_Jelly/dist
          test -f dist/index.html
          test -f InnerVoice_Jelly/dist/index.html

      - name: Validate backend dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r InnerVoice_Jelly/requirements.txt

      - name: Create deployment package
        run: |
          zip -r luna-deploy.zip InnerVoice_Jelly dist requirements.txt \
            -x "InnerVoice_Jelly/__pycache__/*" \
            -x "InnerVoice_Jelly/*/__pycache__/*"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: luna-deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Verify deployment package
        run: unzip -l luna-deploy.zip | grep -E '(^| )dist/index.html|(^| )InnerVoice_Jelly/dist/index.html'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0B12E0AC185A4E59A9EF77A4D88EB68B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5BAC41996E3841B8801E2630DD1144D4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5C7856AB64644E79B79DFC43A7EA8FD0 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'luna-final-app'
          slot-name: 'Production'
          package: luna-deploy.zip
          startup-command: 'sh InnerVoice_Jelly/startup.sh'
