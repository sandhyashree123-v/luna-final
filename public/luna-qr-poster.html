<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luna QR</title>
    <style>
      :root {
        --bg: #05030b;
        --panel: rgba(20, 17, 30, 0.94);
        --panel-soft: rgba(31, 26, 45, 0.82);
        --border: rgba(202, 188, 232, 0.16);
        --text: #eee8f1;
        --muted: #9d99ad;
        --accent: #b79be5;
        --accent-light: #eadfff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          radial-gradient(circle at 50% -10%, rgba(128, 98, 180, 0.18), transparent 38%),
          radial-gradient(circle at 15% 20%, rgba(73, 55, 106, 0.18), transparent 26%),
          linear-gradient(180deg, #080611 0%, #05030b 62%, #020107 100%);
        color: var(--text);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      .card {
        width: min(100%, 430px);
        padding: 30px;
        border: 1px solid var(--border);
        border-radius: 26px;
        background:
          linear-gradient(180deg, var(--panel), rgba(10, 8, 17, 0.96)),
          radial-gradient(circle at top, rgba(183, 155, 229, 0.12), transparent 36%);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.58);
        text-align: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 13px;
        margin-bottom: 20px;
      }

      .moon {
        width: 44px;
        height: 44px;
        border: 2px solid rgba(238, 232, 241, 0.58);
        border-radius: 50%;
        position: relative;
      }

      .moon::after {
        content: "";
        position: absolute;
        top: -5px;
        right: -10px;
        width: 36px;
        height: 50px;
        border-right: 2px solid rgba(183, 155, 229, 0.5);
        border-radius: 50%;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 56px;
        line-height: 0.95;
        font-weight: 700;
        color: var(--text);
      }

      .tagline {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .qr-box {
        padding: 16px;
        border: 1px solid rgba(183, 155, 229, 0.28);
        border-radius: 22px;
        background: var(--panel-soft);
      }

      .qr-box img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
        background: #f8f3ff;
      }

      .url {
        margin: 20px 0 0;
        color: var(--accent-light);
        font-size: 13px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .button {
        display: inline-flex;
        margin-top: 20px;
        padding: 12px 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, #eadfff, #a98bd9);
        color: #191323;
        font-weight: 700;
        text-decoration: none;
      }

      @media print {
        body {
          background: #fff;
        }

        .card {
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <span class="moon" aria-hidden="true"></span>
        <h1>Luna</h1>
      </div>

      <p class="tagline">A calm space for thoughtful conversation, private journaling, and everyday reflection.</p>

      <div class="qr-box">
        <img src="luna-qr.png" alt="QR code for the Luna app" />
      </div>

      <p class="url">https://luna-final-app-gnbua6g2hpeeg8h5.southeastasia-01.azurewebsites.net/</p>
      <a class="button" href="https://luna-final-app-gnbua6g2hpeeg8h5.southeastasia-01.azurewebsites.net/">Open Luna</a>
    </main>
  </body>
</html>
